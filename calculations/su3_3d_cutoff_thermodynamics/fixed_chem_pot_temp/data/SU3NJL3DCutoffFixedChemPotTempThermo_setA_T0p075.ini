[FileDetails]
type = SU3NJL3DCutoffFixedChemicalPotentialTemperatureThermodynamicsFixedTemperatureTrajectory

[SU3NJL3DCutoffModelParameters]
parameterSetName = SetA
regularizationScheme = CUTOFF_EVERYWHERE_WITH_CTMU
cutoff_GeV = 0.6023
upQuarkCurrentMass_GeV = 0.0055
downQuarkCurrentMass_GeV = 0.0055
strangeQuarkCurrentMass_GeV = 0.1407

[NJLDimensionfulCouplings]
lagrangianInteractions = SP4Q_DET2NFQ
fourQuarkSPCouplingCutoff2 = 3.67
determinantCouplingCutoff5 = -12.36

[VacuumMassesParameters]
precisionVacuum = 1E-8
methodVacuum = DNEWTON
upQuarkMassGuess_GeV = 0.3
downQuarkMassGuess_GeV = 0.3
strangeQuarkMassGuess_GeV = 0.5

[VacuumToTemperatureParameters]
temperature_GeV = 0.075
numberOfPointsVacuumToTemperature = 2000
precisionVacuumToTemperature = 1E-8
methodVacuumToTemperature = DNEWTON

[ToChemicalPotentialSymmetricParameters]
chemicalPotential_GeV = 0.5
numberOfPointsToChemicalPotential = 2000
precisionToChemicalPotential = 1E-8
methodToChemicalPotential = DNEWTON

[OutputFileParameters]
customSuffix = 
